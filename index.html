<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테트리스</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>테트리스</h1>
      <p class="subtitle">HTML · CSS · JavaScript 학습용 프로젝트</p>
    </header>

    <main class="game-area">
      <section class="board-section">
        <h2 class="section-title">게임 보드</h2>
        <div id="board" class="board" aria-label="테트리스 게임 보드"></div>
      </section>

      <aside class="side-panel">
        <section class="panel-box">
          <h2 class="section-title">점수</h2>
          <p id="score" class="score-value" aria-live="polite">0</p>
        </section>

        <section class="panel-box">
          <h2 class="section-title">게임</h2>
          <div class="button-group">
            <button id="start-btn" type="button" class="btn btn-primary">시작</button>
            <button id="restart-btn" type="button" class="btn btn-secondary">재시작</button>
          </div>
          <p id="status" class="status-text" aria-live="polite">대기 중</p>
        </section>

        <section class="panel-box">
          <h2 class="section-title">조작법</h2>
          <ul class="controls-list">
            <li><kbd>←</kbd> 왼쪽 이동</li>
            <li><kbd>→</kbd> 오른쪽 이동</li>
            <li><kbd>↓</kbd> 한 칸 빠르게 내리기</li>
            <li><kbd>↑</kbd> 블록 회전</li>
            <li><kbd>Space</kbd> 즉시 내리기 (hard drop)</li>
          </ul>
        </section>
      </aside>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
